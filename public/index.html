<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 视频大师 - 智能遮罩与渲染</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .canvas-container { position: relative; cursor: crosshair; display: flex; align-items: center; justify-content: center; }
        #mask-canvas { position: absolute; pointer-events: none; opacity: 0.6; z-index: 10; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function App() {
            const [videoFile, setVideoFile] = useState(null);
            const [videoUrl, setVideoUrl] = useState(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [isDrawingActive, setIsDrawingActive] = useState(false);
            const [brushSize, setBrushSize] = useState(20);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [presets, setPresets] = useState([]);
            const [currentPreset, setCurrentPreset] = useState("");
            const [isRendering, setIsRendering] = useState(false);
            const [trimRange, setTrimRange] = useState([0, 0]);
            const [capturedMasks, setCapturedMasks] = useState([]); // { time, dataUrl }
            const [previewImage, setPreviewImage] = useState(null);
            const [outputPath, setOutputPath] = useState(""); 

            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const ctxRef = useRef(null);
            const containerRef = useRef(null);
            const [scale, setScale] = useState(1);
            const [offset, setOffset] = useState({ x: 0, y: 0 });
            const [isPanning, setIsPanning] = useState(false);
            const [lastMouse, setLastMouse] = useState({ x: 0, y: 0 });

            // 初始化画笔上下文
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.strokeStyle = 'red';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round'; // Preserve lineJoin
                ctxRef.current = ctx;

                // 阻止浏览器缩放
                const container = containerRef.current;
                const handleWheelNative = (e) => {
                    if (e.ctrlKey) {
                        e.preventDefault();
                        const delta = e.deltaY > 0 ? 0.9 : 1.1;
                        setScale(prev => Math.max(0.1, Math.min(10, prev * delta)));
                    }
                };
                if (container) {
                    container.addEventListener('wheel', handleWheelNative, { passive: false });
                }
                return () => {
                    if (container) container.removeEventListener('wheel', handleWheelNative);
                };
            }, [videoUrl]); // 当视频URL变化时重新绑定（URL变化通常意味着重新加载）

            // 加载预设列表
            useEffect(() => {
                fetch('/api/presets').then(res => res.json()).then(setPresets);
            }, []);

            // 加载选中预设的内容
            useEffect(() => {
                if (currentPreset) {
                    fetch(`/api/presets/${currentPreset}`)
                        .then(res => res.json())
                        .then(config => {
                            if (config.trimRange) setTrimRange(config.trimRange);
                            if (config.masks) setCapturedMasks(config.masks);
                            if (config.brushSize) setBrushSize(config.brushSize);
                        })
                        .catch(err => console.error("加载预设失败:", err));
                } else {
                    setCapturedMasks([]);
                }
            }, [currentPreset]);

            // 绘图逻辑
            // React onWheel removed to avoid passive listener issues

            const handleMouseDown = (e) => {
                if (e.button === 1 || (e.button === 0 && e.altKey)) { // Middle click or Alt+Left
                    setIsPanning(true);
                    setLastMouse({ x: e.clientX, y: e.clientY });
                    return;
                }
                startDrawing(e);
            };

            const handleMouseMove = (e) => {
                if (isPanning) {
                    const dx = e.clientX - lastMouse.x;
                    const dy = e.clientY - lastMouse.y;
                    setOffset(prev => ({ x: prev.x + dx / scale, y: prev.y + dy / scale }));
                    setLastMouse({ x: e.clientX, y: e.clientY });
                    return;
                }
                draw(e);
            };

            const handleMouseUp = () => {
                setIsPanning(false);
                stopDrawing();
            };

            const startDrawing = (e) => {
                const canvas = canvasRef.current;
                const video = videoRef.current;
                if (!canvas || !video) return;
                
                const rect = canvas.getBoundingClientRect();
                // 使用视频的实际显示尺寸来映射坐标，确保 1:1 映射到原始分辨率
                const x = (e.clientX - rect.left) * (canvas.width / rect.width);
                const y = (e.clientY - rect.top) * (canvas.height / rect.height);
                
                ctxRef.current.lineWidth = brushSize * (canvas.width / rect.width) / scale; 
                ctxRef.current.beginPath();
                ctxRef.current.moveTo(x, y);
                setIsDrawingActive(true);
            };

            const draw = (e) => {
                if (!isDrawingActive) return;
                const canvas = canvasRef.current;
                if (!canvas) return;
                
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (canvas.width / rect.width);
                const y = (e.clientY - rect.top) * (canvas.height / rect.height);
                
                ctxRef.current.lineTo(x, y);
                ctxRef.current.stroke();
            };

            const stopDrawing = () => {
                if (isDrawingActive) {
                    ctxRef.current.closePath();
                    setIsDrawingActive(false);
                }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setVideoFile(file);
                    setVideoUrl(URL.createObjectURL(file));
                }
            };

            const toggleDrawing = () => setIsDrawing(!isDrawing);

            const captureMask = () => {
                if (!canvasRef.current || !videoRef.current) return;
                const dataUrl = canvasRef.current.toDataURL();
                // 默认范围：当前时间到当前时间+5秒
                setCapturedMasks([...capturedMasks, { 
                    id: Date.now(),
                    time: currentTime, 
                    dataUrl,
                    startTime: parseFloat(currentTime.toFixed(1)),
                    endTime: parseFloat((currentTime + 5).toFixed(1)),
                    originalWidth: videoRef.current.videoWidth,
                    originalHeight: videoRef.current.videoHeight
                }]);
                // 清空画布以便绘制下一帧
                ctxRef.current.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                alert(`已捕获遮罩 (${videoRef.current.videoWidth}x${videoRef.current.videoHeight})`);
            };

            const handleClearVideo = () => {
                if (window.confirm("确定要清除当前视频吗？所有未保存的蒙版都将丢失。")) {
                    setVideoFile(null);
                    setVideoUrl(null);
                    setCapturedMasks([]);
                    setCurrentTime(0);
                    setDuration(0);
                    if (canvasRef.current && ctxRef.current) {
                        ctxRef.current.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                    }
                }
            };

            const startRender = async () => {
                if (!videoFile || !currentPreset) {
                    alert("请上传视频并选择一个已保存的预设");
                    return;
                }
                
                setIsRendering(true);
                try {
                    // 1. 先进行文件上传
                    const ext = videoFile.name.split('.').pop();
                    const uploadRes = await fetch('/api/upload', {
                        method: 'POST',
                        headers: { 'x-file-ext': ext, 'Content-Type': 'video/mp4' },
                        body: videoFile
                    });
                    const uploadData = await uploadRes.json();
                    
                    // 2. 触发渲染
                    const renderRes = await fetch('/api/render-with-preset', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            videoUrl: uploadData.localPath, 
                            presetName: currentPreset,
                            compositionId: "ApiDrivenVideo",
                            outputPath: outputPath 
                        })
                    });
                    
                    const data = await renderRes.json();
                    alert(data.message);
                    if (data.outputUrl) window.open(data.outputUrl);
                } catch (err) {
                    console.error(err);
                    alert("渲染失败，请检查控制台日志");
                } finally {
                    setIsRendering(false);
                }
            };

            const savePreset = () => {
                const name = prompt("请输入预设名称:");
                if (name) {
                    const config = {
                        brushSize,
                        trimRange,
                        masks: capturedMasks 
                    };
                    fetch('/api/presets', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, config })
                    }).then(() => {
                        alert("预设已保存");
                        setPresets([...presets, name]);
                    });
                }
            };

            const selectPath = async () => {
                try {
                    const res = await fetch('/api/select-path');
                    const data = await res.json();
                    if (data.path) setOutputPath(data.path);
                } catch (err) {
                    console.error("无法打开路径选择框", err);
                }
            };

            return (
                <div className="min-h-screen p-6 flex flex-col gap-6">
                    {/* Header */}
                    <header className="flex justify-between items-center glass p-4 rounded-2xl">
                        <h1 className="text-2xl font-bold flex items-center gap-2 text-blue-400">
                            <span className="material-icons">movie_filter</span>
                            AI 视频大师
                        </h1>
                        <div className="flex gap-4 items-center">
                            {videoUrl && (
                                <button 
                                    onClick={handleClearVideo}
                                    className="flex items-center gap-1 text-xs bg-red-500/20 hover:bg-red-500/40 text-red-400 px-3 py-1.5 rounded-lg border border-red-500/30 transition"
                                >
                                    <span className="material-icons text-sm">backspace</span>
                                    清除视频
                                </button>
                            )}
                            <select 
                                className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm"
                                value={currentPreset}
                                onChange={(e) => setCurrentPreset(e.target.value)}
                            >
                                <option value="">选择预设...</option>
                                {presets.map(p => <option key={p} value={p}>{p}</option>)}
                            </select>
                            <button onClick={savePreset} className="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm transition font-medium">
                                保存预设
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 flex gap-6 overflow-hidden">
                        {/* Left: Video Area */}
                        <div className="flex-[2] glass rounded-2xl flex flex-col p-4 gap-4 overflow-hidden">
                            {!videoUrl ? (
                                <div className="flex-1 border-2 border-dashed border-slate-700 rounded-xl flex flex-col items-center justify-center gap-4 hover:border-blue-500 transition-colors cursor-pointer" onClick={() => document.getElementById('videoInput').click()}>
                                    <span className="material-icons text-6xl text-slate-600">cloud_upload</span>
                                    <p className="text-slate-400">点击或拖拽上传原始视频</p>
                                    <input id="videoInput" type="file" hidden accept="video/*" onChange={handleFileUpload} />
                                </div>
                            ) : (
                                <div className="relative flex-1 bg-black rounded-xl overflow-hidden flex items-center justify-center canvas-container"
                                     ref={containerRef}
                                     onMouseDown={handleMouseDown}
                                     onMouseMove={handleMouseMove}
                                     onMouseUp={handleMouseUp}
                                     onMouseLeave={handleMouseUp}
                                     onContextMenu={e => e.preventDefault()}>
                                    <div style={{ 
                                        transform: `scale(${scale}) translate(${offset.x}px, ${offset.y}px)`,
                                        transition: isPanning ? 'none' : 'transform 0.1s ease-out'
                                    }} className="relative flex items-center justify-center">
                                        <video 
                                            ref={videoRef}
                                            src={videoUrl} 
                                            className="pointer-events-none"
                                            style={{ maxHeight: '70vh', display: 'block' }}
                                            onTimeUpdate={(e) => setCurrentTime(e.target.currentTime)}
                                            onLoadedMetadata={(e) => {
                                                const video = e.target;
                                                setDuration(video.duration);
                                                setTrimRange([0, video.duration]);
                                                
                                                // 强制同步 Canvas 尺寸到视频元数据
                                                const updateCanvasSize = () => {
                                                    if (canvasRef.current) {
                                                        canvasRef.current.width = video.videoWidth;
                                                        canvasRef.current.height = video.videoHeight;
                                                        // 同步显示尺寸（CSS）
                                                        canvasRef.current.style.width = video.clientWidth + 'px';
                                                        canvasRef.current.style.height = video.clientHeight + 'px';
                                                        console.log(`Canvas resized to video intrinsic: ${video.videoWidth}x${video.videoHeight}, display: ${video.clientWidth}x${video.clientHeight}`);
                                                    }
                                                };
                                                
                                                // 多试几次确保 clientWidth 已就绪
                                                updateCanvasSize();
                                                setTimeout(updateCanvasSize, 100);
                                                setTimeout(updateCanvasSize, 500);
                                            }}
                                        />
                                        <canvas 
                                            id="mask-canvas"
                                            ref={canvasRef}
                                        />
                                    </div>
                                    <div className="absolute bottom-4 left-4 bg-black/60 px-2 py-1 rounded text-[10px] text-white pointer-events-none">
                                        Ctrl+滚轮: 缩放 | Alt+拖拽: 平移 | 直接涂抹绘制
                                    </div>
                                </div>
                            )}

                            {/* Timeline Control */}
                            {videoUrl && (
                                <div className="flex flex-col gap-2">
                                    <div className="flex justify-between text-xs text-slate-400">
                                        <span>{currentTime.toFixed(1)}s</span>
                                        <span>{duration.toFixed(1)}s</span>
                                    </div>
                                    <input 
                                        type="range" 
                                        className="w-full" 
                                        min={0} 
                                        max={duration} 
                                        step={0.1}
                                        value={currentTime}
                                        onChange={(e) => {
                                            const time = parseFloat(e.target.value);
                                            videoRef.current.currentTime = time;
                                            setCurrentTime(time);
                                        }}
                                    />
                                </div>
                            )}
                        </div>

                        {/* Right: Settings Area */}
                        <div className="flex-1 glass rounded-2xl p-6 flex flex-col gap-8 overflow-y-auto">
                            <section>
                                <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <span className="material-icons text-blue-400">settings</span>
                                    模板设置
                                </h3>
                                <div className="flex flex-col gap-4">
                                    <label className="text-sm text-slate-400">渲染模板 (Remotion)</label>
                                    <select className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm w-full mb-4">
                                        <option>ApiDrivenVideo</option>
                                    </select>
                                    <label className="text-sm text-slate-400">保存路径 (可选, 服务器绝对路径)</label>
                                    <div className="flex gap-2">
                                        <input 
                                            type="text"
                                            placeholder="例如: D:\output.mp4"
                                            className="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-blue-300"
                                            value={outputPath}
                                            onChange={(e) => setOutputPath(e.target.value)}
                                        />
                                        <button 
                                            onClick={selectPath}
                                            className="bg-slate-700 hover:bg-slate-600 p-2 rounded-lg flex items-center justify-center transition"
                                            title="浏览并选择保存路径"
                                        >
                                            <span className="material-icons text-sm">folder_open</span>
                                        </button>
                                    </div>
                                    <p className="text-[10px] text-slate-500">留空则直接覆盖原始视频文件</p>
                                </div>
                            </section>

                            <section>
                                <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <span className="material-icons text-blue-400">brush</span>
                                    画笔设置
                                </h3>
                                <div className="flex flex-col gap-4">
                                    <div className="flex justify-between text-sm">
                                        <span>画笔大小: {brushSize}px</span>
                                    </div>
                                    <input 
                                        type="range" 
                                        min={5} 
                                        max={100} 
                                        value={brushSize} 
                                        onChange={(e) => setBrushSize(parseInt(e.target.value))}
                                        className="w-full accent-blue-500"
                                    />
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => { 
                                                if (ctxRef.current && canvasRef.current) {
                                                    ctxRef.current.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                                                }
                                            }}
                                            className="flex-1 bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2"
                                        >
                                            <span className="material-icons text-sm">clear_all</span>
                                            清除当前涂抹
                                        </button>
                                        <button 
                                            onClick={captureMask}
                                            className="flex-1 bg-blue-600 hover:bg-blue-500 py-2 rounded-lg text-sm font-medium transition flex items-center justify-center gap-2"
                                        >
                                            <span className="material-icons text-sm">save</span>
                                            应用此帧
                                        </button>
                                    </div>
                                    <div className="text-[10px] text-slate-500 mb-2">
                                        已重置遮罩: {capturedMasks.length} 个
                                    </div>
                                    <div className="flex flex-col gap-2 max-h-40 overflow-y-auto mb-4">
                                        {capturedMasks.map((mask, idx) => (
                                            <div key={mask.id} className="text-[10px] flex flex-col gap-2 bg-slate-800 p-2 rounded-lg border border-slate-700">
                                                <div className="flex items-center gap-2">
                                                    <span className="font-bold text-blue-400"># {idx+1}</span>
                                                    <img 
                                                        src={mask.dataUrl} 
                                                        className="w-10 h-10 object-contain bg-black rounded border border-slate-600 cursor-zoom-in hover:border-blue-400 transition" 
                                                        onClick={() => setPreviewImage(mask.dataUrl)}
                                                    />
                                                    <div className="flex flex-col gap-1">
                                                        <div className="flex items-center gap-1">
                                                            <input 
                                                                type="number" step="0.1" className="w-12 bg-slate-900 rounded px-1" 
                                                                value={mask.startTime} 
                                                                onChange={e => {
                                                                    const newMasks = [...capturedMasks];
                                                                    newMasks[idx].startTime = parseFloat(e.target.value);
                                                                    setCapturedMasks(newMasks);
                                                                }}
                                                            />
                                                            <span>-</span>
                                                            <input 
                                                                type="number" step="0.1" className="w-12 bg-slate-900 rounded px-1" 
                                                                value={mask.endTime} 
                                                                onChange={e => {
                                                                    const newMasks = [...capturedMasks];
                                                                    newMasks[idx].endTime = parseFloat(e.target.value);
                                                                    setCapturedMasks(newMasks);
                                                                }}
                                                            />
                                                        </div>
                                                    </div>
                                                    <button onClick={() => setCapturedMasks(capturedMasks.filter(m => m.id !== mask.id))} className="ml-auto text-red-500 material-icons text-xs">delete</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </section>

                            <section>
                                <h3 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                    <span className="material-icons text-blue-400">content_cut</span>
                                    时长裁剪 (秒)
                                </h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-xs text-slate-400 mb-1 block">开始时间</label>
                                        <input 
                                            type="number" 
                                            className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm w-full"
                                            value={trimRange[0].toFixed(1)}
                                            onChange={(e) => setTrimRange([parseFloat(e.target.value), trimRange[1]])}
                                        />
                                    </div>
                                    <div>
                                        <label className="text-xs text-slate-400 mb-1 block">结束时间</label>
                                        <input 
                                            type="number" 
                                            className="bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm w-full"
                                            value={trimRange[1].toFixed(1)}
                                            onChange={(e) => setTrimRange([trimRange[0], parseFloat(e.target.value)])}
                                        />
                                    </div>
                                </div>
                            </section>

                            <div className="mt-auto">
                                <button 
                                onClick={startRender}
                                disabled={isRendering}
                                className={`w-full py-4 rounded-xl font-bold text-lg transition flex items-center justify-center gap-3 shadow-xl ${
                                    isRendering 
                                    ? "bg-slate-700 text-slate-400 cursor-not-allowed" 
                                    : "bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white shadow-blue-900/40"
                                }`}
                            >
                                <span className={`material-icons ${isRendering ? "animate-spin" : ""}`}>
                                    {isRendering ? "sync" : "rocket_launch"}
                                </span>
                                {isRendering ? "正在处理并渲染中..." : "立刻渲染视频 (生成 MP4)"}
                            </button>
                                <p className="text-[10px] text-slate-500 text-center mt-3">
                                    渲染大约需要 1-3 分钟，完成后将自动下载
                                </p>
                            </div>
                        </div>
                    </main>

                    {/* Image Preview Modal */}
                    {previewImage && (
                        <div 
                            className="fixed inset-0 z-50 flex items-center justify-center p-8 bg-black/90 backdrop-blur-sm transition-all"
                            onClick={() => setPreviewImage(null)}
                        >
                            <div className="relative max-w-full max-h-full flex flex-col items-center">
                                <img 
                                    src={previewImage} 
                                    className="max-w-[90vw] max-h-[80vh] object-contain rounded-xl shadow-2xl border border-slate-700 bg-slate-900 shadow-blue-500/10" 
                                />
                                <button 
                                    className="mt-6 bg-white/10 hover:bg-white/20 text-white px-8 py-3 rounded-full flex items-center gap-2 transition backdrop-blur"
                                    onClick={() => setPreviewImage(null)}
                                >
                                    <span className="material-icons">close</span>
                                    点击任意处关闭
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
